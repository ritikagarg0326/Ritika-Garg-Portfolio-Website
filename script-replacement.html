// ── PRINT HELPER ─────────────────────────────────────────────────────────────
async function print(lines, baseDelay=40) {
  for(const l of lines) {
    const span = document.createElement('span');
    span.className = 'term-line ' + (l.cls || '');
    span.textContent = l.txt;
    body.appendChild(span);
    body.scrollTop = body.scrollHeight;
    await wait(l.t != null ? l.t : baseDelay);
  }
}
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

function printPrompt() {
  const row = document.createElement('span');
  row.className = 'term-line';
  row.innerHTML = '<span style="color:var(--green2)">ritika@prod</span><span style="color:var(--text3)">:</span><span style="color:var(--accent2)">~</span><span style="color:var(--text3)">$ </span>';
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

// ── GITHUB ACTIONS WEBHOOK TRIGGER ───────────────────────────────────────────
async function triggerGitHubAction() {
  try {
    const res = await fetch(
      `https://api.github.com/repos/${GH_USER}/${GH_REPO}/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${GH_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          event_type: 'interview-triggered',
          client_payload: {
            triggered_at: new Date().toISOString(),
            source: 'resume-terminal',
          }
        })
      }
    );
    return res.status === 204; // GitHub returns 204 on success
  } catch(e) {
    console.warn('Webhook failed (CORS or network):', e);
    return false;
  }
}

function buildPipelineViz() {

    col.className = 'pipe-stage';
    col.innerHTML = `
      <div class="pipe-box" id="pb-${s.id}">

        <div class="pipe-name">${s.label}</div>
        <div class="pipe-status" id="ps-${s.id}">waiting</div>

    pipRow.appendChild(col);

      conn.className = 'pipe-connector';

      pipRow.appendChild(conn);

// ── PIPELINE RUNNER ───────────────────────────────────────────────────────────
async function runPipeline() {

  ]);

  buildPipelineViz();

  // ── Fire webhook to GitHub Actions (non-blocking, runs in background) ──
  triggerGitHubAction().then(ok => {
    console.log(ok ? '✓ GitHub Actions triggered' : '✗ Webhook skipped (check token)');
  });

  for(let i=0; i<STAGES_DEF.length; i++) {
    const s = STAGES_DEF[i];
    const box = document.getElementById('pb-' + s.id);
    const stat = document.getElementById('ps-' + s.id);

    box.classList.add('active');
    stat.textContent = 'running...';
    stat.className = 'pipe-status running';

    await print([{cls:'t-amb', t:0, txt:'[' + s.label.toUpperCase() + ']'}]);

    const logs = STAGE_LOGS[s.id] || [];
    let maxT = 0;
    logs.forEach(l => {
      maxT = Math.max(maxT, l.t);
      setTimeout(() => {
        const sp = document.createElement('span');
        sp.className = 'term-line ' + l.cls;
        sp.textContent = l.txt;
        body.appendChild(sp);
        body.scrollTop = body.scrollHeight;
      }, l.t);
    });

    await wait(maxT + 600);

    box.classList.remove('active');
    box.classList.add('done');
    stat.textContent = 'done';
    stat.className = 'pipe-status done';
    if(i < STAGES_DEF.length - 1) {
      document.getElementById('pc-' + i).classList.add('done');
    }
    await wait(300);
  }

  // ── SUCCESS + EMAIL TRIGGER ────────────────────────────────────────────
  await print([
    {cls:'t-wht', t:100, txt:''},
    {cls:'t-grn', t:200, txt:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'},

// ── INPUT HANDLER ─────────────────────────────────────────────────────────────
async function handleCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  printPrompt();
  const last = body.lastElementChild;
  last.innerHTML += raw;
  body.scrollTop = body.scrollHeight;
  await wait(60);

  if(!cmd) return;

  const handler = COMMANDS[cmd];
  if(handler) {
    await handler.run();
  } else {
    await print([
      {cls:'t-red', t:0,  txt:'bash: ' + raw + ': command not found'},
      {cls:'t-dim', t:80, txt:'Type  help  to see available commands.'},
      {cls:'',      t:80, txt:''},
    ]);
  }
}

input.addEventListener('keydown', async (e) => {
  if(e.key === 'Enter' && !busy) {
    busy = true;
    const val = input.value;
    input.value = '';
    input.disabled = true;
    await handleCommand(val);
    input.disabled = false;
    input.focus();
    busy = false;
  }
});
